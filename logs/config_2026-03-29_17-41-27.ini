[Path]
trainDataPath = CSL/splits/train_split.txt
validDataPath = CSL/splits/valid_split.txt
testDataPath = CSL/splits/test_split.txt
trainLabelPath = CSL/corpus.txt
validLabelPath = CSL/corpus.txt
testLabelPath = CSL/corpus.txt

bestModuleSavePath = module/bestMoudleLightTFNet_gpu_000000_fromscratch.pth
currentModuleSavePath = module/currentMoudleLightTFNet_gpu_000000_fromscratch.pth

[Params]
device = 1
hiddenSize = 512
lr = 0.0001
batchSize = 12
numWorkers = 8
pinmMemory = 1
moduleChoice = LightTFNet
dataSetName = CSL
gradAccumSteps = 1
maxGradNorm = 5.0
freezeBackboneEpochs = 1
backboneLrScale = 0.1

# 3090 24G + 原始视频 + 懒缓存 实测保留版
maxEpochs = 30
maxTrainBatches = 0
maxValidBatches = 0
maxTestBatches = 0
frameSampleStride = 4
cnnChunkSize = 192
useAmp = 1

# 兼容旧逻辑，保留为 0；真正控制缓存的是下面 videoCacheMode
usePreprocessed = 0
preprocessedRoot = CSL/cache_v1
videoCacheMode = lazy
videoCacheFormat = npz
cacheTrainOnly = 1
cacheInMemoryItems = 32
persistentWorkers = 1
prefetchFactor = 6
